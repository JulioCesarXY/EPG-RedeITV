name: Atualizar Playlist IPTV

on:
  schedule:
    # Roda todos os dias às 06:00 UTC (03:00 Horário de Brasília)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite que você clique em um botão para rodar manualmente quando quiser

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Dá permissão para a automação salvar o arquivo atualizado no repositório

    steps:
    # 1. Baixa o código do seu repositório para a máquina virtual
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Instala a versão correta do Python
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala as dependências necessárias (neste caso, apenas requests)
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. Executa o script que extrai os links e atualiza o M3U8
    - name: Executar Script de Coleta
      run: python scraper.py

    # 5. Verifica se o arquivo mudou, faz o commit e empurra de volta para o seu GitHub
    - name: Commit e Push das alterações
      run: |
        git config --local user.email "104462712+JulioCesarXY@users.noreply.github.com"
        git config --local user.name "JulioCesarXY"
        
        # Verifica se o arquivo lista_canais.m3u8 foi modificado ou criado
        if [ -n "$(git status --porcelain lista_canais.m3u8)" ]; then
          git add lista_canais.m3u8
          git commit -m "Automação: Playlist M3U8 atualizada [skip ci]"
          git push
        else
          echo "Nenhuma mudança detectada na playlist. Nada para commitar."
        fi
